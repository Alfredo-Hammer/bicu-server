services:
  # Backend API Service
  - type: web
    name: bicu-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://bicu-client.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: bicu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h

databases:
  # PostgreSQL Database
  - name: bicu-db
    plan: free
    databaseName: bicu_inventory
    user: bicu_user
